<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart AQI Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #020617);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }


    .circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.6;
      animation: float 10s infinite alternate;
    }

    .circle1 {
      width: 300px;
      height: 300px;
      background: #38bdf8;
      top: 10%;
      left: 10%;
    }

    .circle2 {
      width: 250px;
      height: 250px;
      background: #22c55e;
      bottom: 10%;
      right: 10%;
    }

    @keyframes float {
      from {
        transform: translateY(0px);
      }

      to {
        transform: translateY(-50px);
      }
    }

    /* Login Card */
    .card {
      width: 380px;
      padding: 35px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
      color: white;
      text-align: center;
      z-index: 2;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .card h1 {
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    /* Inputs */
    .input-box {
      position: relative;
      margin: 15px 0;
    }

    .input-box input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    .input-box input:focus {
      box-shadow: 0 0 10px #38bdf8;
    }

    /* Button */
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #38bdf8;
    }

    /* Links */
    .links {
      margin-top: 15px;
    }

    .links a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 13px;
    }

    /* Error */
    .error {
      color: #ff4d4d;
      font-size: 13px;
      margin-bottom: 10px;
    }

    /* Small animation on hover */
    .card:hover {
      transform: translateY(-5px);
    }
  </style>
</head>

<body>

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>

  <div class="card">
    <h1>🌍 Smart AQI</h1>
    <p>Monitor air quality in real-time</p>

    <div class="error" id="errorMsg"></div>

    <div class="input-box">
      <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Password">
    </div>

    <button onclick="login()">Login</button>

    <div class="links">
      <a href="#">Forgot Password?</a> |
      <a href="#" onclick="register()">Sign Up</a>
    </div>
  </div>

  <script>
    async function login() {
      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;
      let error = document.getElementById("errorMsg");

      if (user === "" || pass === "") {
        error.innerText = "⚠ Fill all fields";
        return;
      }

      try {
        const response = await fetch("http://localhost:5001/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass })
        });

        const data = await response.json();

        if (response.ok) {
          error.innerText = "";
          alert("Welcome " + data.username + " 🚀");
          localStorage.setItem("username", data.username);
          window.location.href = "dashboard.html";
        } else {
          error.innerText = "❌ " + data.msg;
        }
      } catch (err) {
        error.innerText = "❌ Server error";
      }
    }

    async function register() {
      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;
      let error = document.getElementById("errorMsg");

      if (user === "" || pass === "") {
        error.innerText = "⚠ Fill both username and password fields before signing up.";
        return;
      }

      let email = user + "@example.com"; // quick auto email simulation

      try {
        const response = await fetch("http://localhost:5001/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass, email: email })
        });

        const data = await response.json();

        if (response.ok) {
          error.style.color = "#22c55e"; // green
          error.innerText = "✅ " + data.msg + ". Please login now.";
          setTimeout(() => error.style.color = "#ff4d4d", 3000);
        } else {
          error.innerText = "❌ " + data.msg;
        }
      } catch (err) {
        error.innerText = "❌ Server error";
      }
    }
  </script>

</body>

</html>
